trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '18.x'
  displayName: 'Install Node'

- script: npm install
  displayName: 'Install dependencies'

- script: npm run start
  displayName: 'Run app'

- task: AzureWebApp@1
  inputs:
    azureSubscription: 'azure-conn'
    appName: 'gpt-app-test'
    package: '.'